<!DOCTYPE html>
<html lang="es" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso Administrador | Master Dashboard</title>
  
  <!-- Fonts y Material Symbols -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            headline: ["Manrope"],
            body: ["Inter"]
          },
          colors: {
            primary: "#00113a",
            "primary-container": "#002366"
          }
        }
      }
    };
  </script>
</head>
<body class="bg-slate-50 font-body min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Background Decoration -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-pulse"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-30"></div>

  <div class="relative bg-white/80 backdrop-blur-xl border border-white/40 shadow-2xl rounded-2xl w-full max-w-md p-8 sm:p-10 z-10">
    <div class="text-center mb-8">
      <span class="material-symbols-outlined text-primary text-5xl mb-2">admin_panel_settings</span>
      <h1 class="font-headline font-black text-2xl text-primary uppercase tracking-tight">Master Dashboard</h1>
      <p class="text-slate-500 text-sm mt-1">Ingresa tus credenciales de Súper Administrador</p>
    </div>

    <form id="loginForm" class="space-y-6">
      <!-- Mensaje de Error -->
      <div id="errorMessage" class="hidden bg-red-50 text-red-600 border border-red-200 text-sm p-3 rounded-lg text-center font-medium transition-all duration-300">
        Credenciales incorrectas.
      </div>

      <div>
        <label for="email" class="block text-sm font-bold text-slate-700 mb-1">Correo Electrónico</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-slate-400 text-[20px]">mail</span>
          </div>
          <input type="email" id="email" required placeholder="admin@capitalmaquinas.com"
            class="pl-10 w-full px-4 py-3 bg-slate-100 border-none rounded-lg text-slate-900 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none" />
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-bold text-slate-700 mb-1">Contraseña</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-slate-400 text-[20px]">lock</span>
          </div>
          <input type="password" id="password" required placeholder="••••••••"
            class="pl-10 w-full px-4 py-3 bg-slate-100 border-none rounded-lg text-slate-900 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none" />
        </div>
      </div>

      <button type="submit" id="submitBtn"
        class="w-full bg-primary hover:bg-primary-container text-white font-bold py-3 px-4 rounded-lg transition-all active:scale-95 flex justify-center items-center gap-2 mt-4">
        <span>Ingresar al Panel</span>
        <span class="material-symbols-outlined text-[20px]">login</span>
      </button>
      
      <div class="text-center mt-6">
        <a href="index.html" class="text-sm text-slate-500 hover:text-primary font-medium transition-colors">Volver a la tienda</a>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMessage');
      const btn = document.getElementById('submitBtn');
      
      // Simulación de carga
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Verificando...';
      btn.disabled = true;

      // Credenciales quemadas para la demostración del Panel Master
      setTimeout(() => {
        if (email === 'admin@capitalmaquinas.com' && password === 'admin123') {
          // Guardar estado de sesión en localStorage
          localStorage.setItem('adminToken', 'super_admin_token_valido_123');
          window.location.href = 'admin.html';
        } else {
          errorMsg.classList.remove('hidden');
          errorMsg.innerText = 'Credenciales incorrectas. (Pista: admin@capitalmaquinas.com / admin123)';
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      }, 1000);
    });
  </script>
</body>
</html>
